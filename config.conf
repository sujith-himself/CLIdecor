# CLI DECOR config
# Comment out (add # in front) any line you don't want shown.
# Reorder lines to reorder the info panel.
# custom_text can be edited freely.

show_os=1
show_kernel=1
show_uptime=1
show_packages=1
show_shell=1
show_cpu=1
show_gpu=1
show_memory=1
show_disk=1
show_battery=0
show_localip=1

custom_text=Welcome back, boss.

# Path to an image for the logo. Leave blank to use default ascii logo.
image_path=

# color | ascii  (only matters if image_path is set)
image_style=color

# width in terminal columns for the rendered logo
image_width=28
